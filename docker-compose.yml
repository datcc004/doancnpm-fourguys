version: '3.8'

services:
  # ---- MySQL Database ----
  db:
    image: mysql:8.0
    container_name: lc_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: language_center
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lc_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Django Backend ----
  backend:
    build: ./backend
    container_name: lc_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=language_center
      - DB_USER=root
      - DB_PASSWORD=root123
      - DEBUG=True
      - SECRET_KEY=django-insecure-docker-dev-key-change-in-prod
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:80,http://localhost
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lc_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    container_name: lc_frontend
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - lc_network

volumes:
  mysql_data:

networks:
  lc_network:
    driver: bridge
